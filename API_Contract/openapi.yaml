      additionalProperties: true
      type: object
      title: InsightFinboxFeatures
      description: 'Finbox feature set for the insights API.


        Contains hundreds of flat key-value metrics plus several structured

        sub-objects. All fields are optional. Unknown keys are accepted via

        ``extra="allow"`` to remain forward-compatible with new Finbox features.'
    InsightGroups:
      properties:
        top_insight:
          anyOf:
          - $ref: '#/components/schemas/InsightItem'
          - type: 'null'
          description: Single most important cross-pillar insight (may be null).
        spending:
          items:
            $ref: '#/components/schemas/InsightItem'
          type: array
          title: Spending
          description: Spending pillar insight cards.
        borrowing:
          items:
            $ref: '#/components/schemas/InsightItem'
          type: array
          title: Borrowing
          description: Borrowing pillar insight cards.
        protection:
          items:
            $ref: '#/components/schemas/InsightItem'
          type: array
          title: Protection
          description: Protection pillar insight cards.
        wealth:
          items:
            $ref: '#/components/schemas/InsightItem'
          type: array
          title: Wealth
          description: Wealth pillar insight cards.
        tax:
          items:
            $ref: '#/components/schemas/InsightItem'
          type: array
          title: Tax
          description: Tax pillar insight cards.
      type: object
      title: InsightGroups
      description: Insight cards grouped by pillar, with an optional cross-pillar
        top insight.
    InsightInputRequest:
      properties:
        metadata:
          $ref: '#/components/schemas/FfrRequestMetadata'
          description: Request envelope with correlation IDs and pillar selection.
        data:
          $ref: '#/components/schemas/FfrScreenData'
          description: Structured financial data payload.
        features:
          $ref: '#/components/schemas/app__models__insight__Features'
          description: External feature blocks (e.g. Finbox).
      type: object
      required:
      - metadata
      - data
      - features
      title: InsightInputRequest
      description: 'Request body for `POST /v1/ffr_insight`.


        Contains the request metadata, financial data payload, and optional

        external features used to generate per-pillar insight cards.'
    InsightItem:
      properties:
        id:
          type: string
          title: Id
          description: Unique insight identifier.
        theme:
          type: string
          title: Theme
          description: Thematic tag, e.g. `Overspending`, `Debt Risk`.
        headline:
          type: string
          title: Headline
          description: Short, attention-grabbing headline.
        description:
          type: string
          title: Description
          description: Detailed explanation of the insight.
        cta:
          $ref: '#/components/schemas/CTAObject'
          description: Call-to-action for this insight.
      type: object
      required:
      - id
      - theme
      - headline
      - description
      - cta
      title: InsightItem
      description: A single LLM-generated insight card.
      examples:
      - cta:
          action: jio://cashflow/view
          text: View Spending
        description: Consider reviewing discretionary expenses to improve your savings
          buffer.
        headline: Your spend-to-income ratio is above 70%
        id: spending_high_ratio
        theme: Overspending
    InsightOutputResponse:
      properties:
        metadata:
          $ref: '#/components/schemas/InsightResponseMetadata'
          description: Response metadata (customer_id, request_id, timestamp, version).
        error:
          anyOf:
          - $ref: '#/components/schemas/InsightErrorBody'
          - type: 'null'
          description: Error details; null on success.
        data:
          anyOf:
          - $ref: '#/components/schemas/InsightGroups'
          - type: 'null'
          description: Grouped insight cards; null on error.
      type: object
      required:
      - metadata
      title: InsightOutputResponse
      description: 'Response body for `POST /v1/ffr_insight`.


        On success, `data` contains the grouped insight cards and `error` is null.

        On failure, `error` contains the error details and `data` is null.'
    InsightResponseMetadata:
      properties:
        customer_id:
          type: string
          title: Customer Id
          description: Echo of the input customer_id.
        request_id:
          type: string
          title: Request Id
          description: Echo of the input request_id.
        timestamp:
          type: string
          title: Timestamp
          description: ISO-8601 response generation timestamp.
        version:
          type: string
          title: Version
          description: API version string.
      type: object
      required:
      - customer_id
      - request_id
      - timestamp
      - version
      title: InsightResponseMetadata
      description: Metadata envelope for insight responses.
