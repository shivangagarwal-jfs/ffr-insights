          title: Metric Summaries Ui
          description: Map of metric key to a UI-ready prose summary string. Keys
            correspond to pillar metrics (e.g. `spending_score`, `emi_burden`).
        overall_summary:
          $ref: '#/components/schemas/OverallSummary'
      type: object
      title: Payload
      description: Success payload containing per-metric prose and an overall summary.
    PortfolioSlice:
      properties:
        name:
          type: string
          title: Name
          description: Asset class or category name.
        value:
          anyOf:
          - type: number
          - type: integer
          title: Value
          description: Allocation value (absolute or percentage).
      type: object
      required:
      - name
      - value
      title: PortfolioSlice
      description: One slice of a portfolio diversification breakdown.
      examples:
      - name: equity
        value: 60
    ResponseMetadata:
      properties:
        request_id:
          type: string
          title: Request Id
          description: Echo of the input request_id, or a server-generated UUID.
        timestamp:
          type: string
          title: Timestamp
          description: ISO-8601 response generation timestamp.
        version:
          type: string
          title: Version
          description: API version string.
        source:
          type: string
          title: Source
          description: Service identifier, e.g. `"pillar_summary_api"`.
        channel:
          type: string
          title: Channel
          description: Channel identifier, e.g. `"api"`.
      type: object
      required:
      - request_id
      - timestamp
      - version
      - source
      - channel
      title: ResponseMetadata
      description: Metadata envelope for summary responses.
    RuleBasedInsightItem:
      properties:
        id:
          type: string
          title: Id
          description: Unique insight identifier.
        theme:
          type: string
          title: Theme
          description: Thematic category of the insight.
        headline:
          type: string
          title: Headline
          description: Short headline text.
        description:
          type: string
          title: Description
          description: Detailed description body.
        cta:
          $ref: '#/components/schemas/CTAObject'
          description: Call-to-action for this insight.
      type: object
      required:
      - id
      - theme
      - headline
      - description
      - cta
      title: RuleBasedInsightItem
      description: A single pre-computed (rule-based) insight card supplied by the
        client.
    RuleBasedInsights:
      properties:
        spending:
          items:
            $ref: '#/components/schemas/RuleBasedInsightItem'
          type: array
          title: Spending
          description: Spending pillar rule-based insights.
        borrowing:
          items:
            $ref: '#/components/schemas/RuleBasedInsightItem'
          type: array
          title: Borrowing
          description: Borrowing pillar rule-based insights.
        protection:
          items:
            $ref: '#/components/schemas/RuleBasedInsightItem'
          type: array
          title: Protection
          description: Protection pillar rule-based insights.
        wealth:
          items:
            $ref: '#/components/schemas/RuleBasedInsightItem'
          type: array
          title: Wealth
          description: Wealth pillar rule-based insights.
        tax:
          items:
            $ref: '#/components/schemas/RuleBasedInsightItem'
          type: array
          title: Tax
          description: Tax pillar rule-based insights.
      type: object
      title: RuleBasedInsights
      description: 'Per-pillar rule-based insight cards supplied by the client, used
        as

        seed data alongside LLM-generated insights.'
    SummaryRequest:
      properties:
        metadata:
          $ref: '#/components/schemas/FfrRequestMetadata'
          description: Request envelope with correlation IDs and pillar selection.
        data:
          $ref: '#/components/schemas/FfrScreenData'
          description: Structured financial data payload.
        features:
          anyOf:
          - $ref: '#/components/schemas/app__models__common__Features'
          - type: 'null'
          description: Optional external feature blocks (e.g. Finbox).
      type: object
      required:
      - metadata
      - data
      title: SummaryRequest
      description: 'Request body for `POST /v1/ffr_summary`.


        Contains the request metadata, financial data payload, and optional

        external features used to generate per-pillar prose summaries.

        Unknown fields (e.g. legacy `"provider"`) are silently ignored.'
    SummaryResponse:
      properties:
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'
          description: Response metadata.
        error:
          anyOf:
          - $ref: '#/components/schemas/ErrorBody'
          - type: 'null'
          description: Error details; null on success.
        data:
          anyOf:
          - $ref: '#/components/schemas/Payload'
          - type: 'null'
          description: Summary payload; null on error.
      type: object
      required:
      - metadata
      title: SummaryResponse
      description: 'Response body for `POST /v1/ffr_summary`.


        On success, `data` contains the metric summaries and overall summary and

        `error` is null.  On failure, `error` contains the error details and

        `data` is null.'
    ValidationDetail:
      properties:
        field:
          type: string
          title: Field
          description: Dot-path of the field that failed validation.
        issue:
          type: string
          title: Issue
          description: Human-readable description of the validation issue.
      type: object
      required:
      - field
      - issue
      title: ValidationDetail
      description: Detail entry for a single validation failure.
    app__models__common__Features:
      properties:
        finbox:
          anyOf:
          - $ref: '#/components/schemas/FinboxFeatures'
          - type: 'null'
          description: Finbox-derived feature set.
      type: object
      title: Features
      description: Feature blocks from external providers (e.g. Finbox).
    app__models__insight__Features:
      properties:
        finbox:
          anyOf:
          - $ref: '#/components/schemas/InsightFinboxFeatures'
          - type: 'null'
          description: Finbox feature set. All fields are optional; unknown keys are
            accepted.
      type: object
      title: Features
      description: Feature data supplied alongside the insight request (e.g. Finbox
        signals).
tags:
- name: FFR
  description: Financial Fitness Report endpoints — pillar summaries and insight cards.
