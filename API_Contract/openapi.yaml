        total_discretionary_spend_m6:
          anyOf:
          - type: number
          - type: 'null'
          title: Total Discretionary Spend M6
          description: Total discretionary spend, month-6.
        amt_debit_txn_m0:
          anyOf:
          - type: number
          - type: 'null'
          title: Amt Debit Txn M0
          description: Total debit transaction amount, current month.
        amt_debit_txn_m1:
          anyOf:
          - type: number
          - type: 'null'
          title: Amt Debit Txn M1
          description: Total debit transaction amount, month-1.
        amt_debit_txn_m2:
          anyOf:
          - type: number
          - type: 'null'
          title: Amt Debit Txn M2
          description: Total debit transaction amount, month-2.
        amt_debit_txn_m3:
          anyOf:
          - type: number
          - type: 'null'
          title: Amt Debit Txn M3
          description: Total debit transaction amount, month-3.
        amt_debit_txn_m4:
          anyOf:
          - type: number
          - type: 'null'
          title: Amt Debit Txn M4
