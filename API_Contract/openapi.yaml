          - additionalProperties:
              $ref: '#/components/schemas/LoanAccount'
            type: object
          - type: 'null'
          title: Loan Profile
          description: Loan account profiles keyed by `loan_acc1`, `loan_acc2`, etc.
        total_essential_spend_m0:
          anyOf:
          - type: number
          - type: 'null'
          title: Total Essential Spend M0
          description: Total essential spend, current month.
        total_essential_spend_m1:
          anyOf:
          - type: number
          - type: 'null'
          title: Total Essential Spend M1
          description: Total essential spend, month-1.
        total_essential_spend_m2:
          anyOf:
          - type: number
          - type: 'null'
          title: Total Essential Spend M2
          description: Total essential spend, month-2.
        total_essential_spend_m3:
          anyOf:
          - type: number
          - type: 'null'
          title: Total Essential Spend M3
          description: Total essential spend, month-3.
        total_essential_spend_m4:
          anyOf:
          - type: number
          - type: 'null'
          title: Total Essential Spend M4
          description: Total essential spend, month-4.
        total_essential_spend_m5:
          anyOf:
          - type: number
          - type: 'null'
          title: Total Essential Spend M5
          description: Total essential spend, month-5.
        total_essential_spend_m6:
          anyOf:
          - type: number
          - type: 'null'
          title: Total Essential Spend M6
          description: Total essential spend, month-6.
        total_discretionary_spend_m0:
          anyOf:
          - type: number
          - type: 'null'
          title: Total Discretionary Spend M0
          description: Total discretionary spend, current month.
        total_discretionary_spend_m1:
          anyOf:
          - type: number
          - type: 'null'
          title: Total Discretionary Spend M1
          description: Total discretionary spend, month-1.
        total_discretionary_spend_m2:
          anyOf:
          - type: number
          - type: 'null'
          title: Total Discretionary Spend M2
          description: Total discretionary spend, month-2.
        total_discretionary_spend_m3:
          anyOf:
          - type: number
          - type: 'null'
          title: Total Discretionary Spend M3
          description: Total discretionary spend, month-3.
        total_discretionary_spend_m4:
          anyOf:
          - type: number
          - type: 'null'
          title: Total Discretionary Spend M4
