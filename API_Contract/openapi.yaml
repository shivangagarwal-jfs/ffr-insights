openapi: 3.1.0
info:
  title: FFR API — Financial Fitness Report
  description: 'Gemini-powered API that analyses structured financial data and scores
    across five pillars (spending, borrowing, protection, tax, wealth) to produce:


    * **Pillar summaries** — per-metric prose and a holistic overview with strengths
    and areas needing attention.

    * **Insight cards** — actionable, themed insight cards grouped by pillar with
    an optional cross-pillar top insight.


    Both endpoints accept the same `FfrScreenData` payload and return structured JSON
    envelopes with consistent error shapes.'
  version: 1.0.0
paths:
  /v1/ffr_summary:
    post:
      tags:
      - FFR
      summary: Generate pillar summaries
      description: Produces per-metric prose summaries and a holistic overall summary
        (strengths + areas needing attention) from structured financial data and pillar
        scores. `metadata.type` selects which pillars are in scope.
      operationId: generate_summary_v1_ffr_summary_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SummaryRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummaryResponse'
        '422':
          description: Validation error — missing pillar data, invalid metadata types,
            or malformed request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummaryResponse'
        '500':
          description: Internal server error — LLM failure or response assembly error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummaryResponse'
        '503':
          description: Service misconfigured — missing Gemini API key or base URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummaryResponse'
  /v1/ffr_insight:
    post:
      tags:
      - FFR
      summary: Generate pillar insight cards
      description: Produces LLM-generated insight cards grouped by financial pillar
        (spending, borrowing, protection, tax, wealth) plus an optional cross-pillar
        top insight. `metadata.type` selects which pillars are in scope.
      operationId: generate_insight_v1_ffr_insight_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InsightInputRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsightOutputResponse'
        '422':
          description: Validation error — missing pillar data, invalid metadata types,
            or malformed request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsightOutputResponse'
        '500':
          description: Internal server error — insight generation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsightOutputResponse'
components:
  schemas:
    BankAccountProfile:
      properties:
        acc_no:
          anyOf:
          - type: string
          - type: 'null'
          title: Acc No
          description: Account identifier string.
        bank_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Bank Name
          description: Bank name.
        latest_balance:
          anyOf:
          - type: number
          - type: 'null'
          title: Latest Balance
          description: Latest available balance (INR).
        cnt_credits_c30:
          anyOf:
          - type: integer
          - type: 'null'
          title: Cnt Credits C30
          description: Credit transaction count in last 30 days.
        amt_credits_c30:
          anyOf:
          - type: number
          - type: 'null'
          title: Amt Credits C30
          description: Total credit amount in last 30 days (INR).
        cnt_debits_c30:
          anyOf:
          - type: integer
          - type: 'null'
          title: Cnt Debits C30
          description: Debit transaction count in last 30 days.
        amt_debits_c30:
          anyOf:
          - type: number
          - type: 'null'
          title: Amt Debits C30
          description: Total debit amount in last 30 days (INR).
        avg_balance_c30:
          anyOf:
          - type: number
          - type: 'null'
          title: Avg Balance C30
          description: Average balance over last 30 days (INR).
      additionalProperties: true
      type: object
      title: BankAccountProfile
      description: Single bank account entry inside ``all_account_profile``.
    BillAccount:
      properties:
        bill_provider:
          anyOf:
          - type: string
          - type: 'null'
          title: Bill Provider
          description: Provider name, e.g. `"jio"`, `"maharashtra electricity"`.
        bill_category:
          anyOf:
          - type: string
          - type: 'null'
          title: Bill Category
          description: Category, e.g. `"phone"`, `"electricity"`.
        bill_acc_number:
          anyOf:
          - type: string
          - type: 'null'
          title: Bill Acc Number
          description: Account identifier.
        billing_plan:
          anyOf:
          - type: string
          - type: 'null'
          title: Billing Plan
          description: Billing plan, e.g. `"prepaid"`, `"postpaid"`.
        bill_detail_m1:
          anyOf:
          - $ref: '#/components/schemas/BillDetail'
          - type: 'null'
          description: Most recent month billing detail.
      additionalProperties: true
      type: object
      title: BillAccount
      description: One bill account entry inside ``bill_profile``.
    BillDetail:
      properties:
        bill_amount:
          anyOf:
          - type: number
          - type: 'null'
          title: Bill Amount
          description: Bill amount for the period.
        bill_status:
          anyOf:
          - type: string
          - type: 'null'
          title: Bill Status
          description: Status string, e.g. `"bill_paid"`.
        bill_paid_amt:
          anyOf:
          - type: number
          - type: 'null'
          title: Bill Paid Amt
          description: Amount actually paid.
        bill_status_inbox_date:
          anyOf:
          - type: string
          - type: 'null'
          title: Bill Status Inbox Date
          description: Date the bill status was received (YYYY-MM-DD).
        bill_due_date:
          anyOf:
          - type: string
          - type: 'null'
          title: Bill Due Date
          description: Payment due date (YYYY-MM-DD), null for prepaid.
      additionalProperties: true
      type: object
      title: BillDetail
      description: Single billing period detail for a bill account.
    CTAObject:
      properties:
        text:
          type: string
          title: Text
          description: Button / link label shown to the user.
        action:
          type: string
          title: Action
          description: Action identifier consumed by the client app for navigation.
      type: object
      required:
      - text
      - action
      title: CTAObject
      description: Call-to-action with display text and a navigation action identifier.
      examples:
      - action: jio://cashflow/view
        text: View Details
    ErrorBody:
      properties:
        code:
          type: string
          title: Code
          description: Machine-readable error code, e.g. `VALIDATION_ERROR`, `LLM_ERROR`.
        message:
          type: string
          title: Message
          description: Human-readable error summary.
        details:
          items:
            $ref: '#/components/schemas/ErrorDetail'
          type: array
          title: Details
          description: Per-field validation failure details (empty on non-validation
            errors).
      type: object
      required:
      - code
      - message
      title: ErrorBody
      description: Error envelope returned when summary generation fails.
    ErrorDetail:
      properties:
        field:
          type: string
          title: Field
          description: Dot-path of the field that failed validation.
        issue:
          type: string
          title: Issue
          description: Human-readable description of the validation issue.
      type: object
      required:
      - field
      - issue
      title: ErrorDetail
      description: Alias kept for backwards compatibility with summary error paths.
    FfrRequestMetadata:
      properties:
        customer_id:
          type: string
          title: Customer Id
          description: Unique customer identifier.
        request_id:
          type: string
          title: Request Id
          description: Correlation / idempotency key.
        timestamp:
          type: string
          title: Timestamp
          description: ISO-8601 request timestamp.
        version:
          type: string
          title: Version
          description: Client API version string.
        type:
          items:
            type: string
          type: array
          title: Type
          description: 'Pillar(s) to generate. Each element must be one of: "spending",
            "borrowing", "protection", "tax", "wealth".'
      type: object
      required:
      - customer_id
      - request_id
      - timestamp
      - version
      title: FfrRequestMetadata
      description: 'Common request envelope carrying correlation identifiers and the
        list of

        financial pillars the client is requesting.'
      examples:
      - customer_id: cust_abc123
        request_id: req_7f3a
        timestamp: '2025-06-15T10:30:00Z'
        type:
        - spending
        - borrowing
        version: 1.0.0
    FfrScreenData:
      properties:
        customer_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Customer Id
        age:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Age
          description: User age in years; used with city/profession/income/family_size
            for the on-the-fly Persona paragraph.
        city:
          anyOf:
          - type: string
          - type: 'null'
          title: City
          description: City name; tier (Tier-1 vs Tier-2) is derived server-side for
            persona selection.
        profession_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Profession Type
          description: Profession category string (e.g. salaried, gig, founder); used
            in the Persona paragraph.
        annual_income:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Annual Income
          description: Gross annual income in INR; if omitted, may be inferred from
            monthly_income for the Persona paragraph.
        family_size:
          anyOf:
          - type: integer
          - type: 'null'
          title: Family Size
          description: Household size including the user; dependents are computed
            as max(0, family_size - 1) for the Persona paragraph.
        jio_score:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Jio Score
          description: Composite financial fitness score (0–100).
          default: 0
        spending_score:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Spending Score
          description: Spending pillar score (0–100).
          default: 0
        monthly_income:
          items:
            $ref: '#/components/schemas/MonthValue'
          type: array
          title: Monthly Income
          description: Monthly income time-series.
        monthly_spend:
          items:
            $ref: '#/components/schemas/MonthValue'
          type: array
          title: Monthly Spend
          description: Monthly spend time-series.
        avg_monthly_spends:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Avg Monthly Spends
          description: Average monthly spend (INR).
        spend_to_income_ratio:
          items:
            $ref: '#/components/schemas/MonthValue'
          type: array
          title: Spend To Income Ratio
          description: Monthly spend-to-income ratio time-series.
        saving_consistency:
          items:
            $ref: '#/components/schemas/MonthValue'
          type: array
          title: Saving Consistency
          description: Monthly savings consistency time-series (also accepts `savings_consistency`).
        monthly_cash_inflow:
          items:
            $ref: '#/components/schemas/MonthValue'
          type: array
          title: Monthly Cash Inflow
          description: Monthly cash inflow time-series.
        monthly_cash_outflow:
          items:
            $ref: '#/components/schemas/MonthValue'
          type: array
          title: Monthly Cash Outflow
          description: Monthly cash outflow time-series.
        emergency_corpus:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Emergency Corpus
          description: Current emergency corpus amount (INR).
          default: 0
        ideal_emergency_corpus:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Ideal Emergency Corpus
          description: Recommended emergency corpus amount (INR).
          default: 0
        borrowing_score:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Borrowing Score
          description: Borrowing pillar score (0–100).
          default: 0
        emi_burden:
          items:
            $ref: '#/components/schemas/MonthValue'
          type: array
          title: Emi Burden
          description: Monthly EMI-to-income burden ratio time-series.
        monthly_emi:
          items:
            $ref: '#/components/schemas/MonthValue'
          type: array
          title: Monthly Emi
          description: Monthly EMI amount time-series.
        credit_score:
          items:
            $ref: '#/components/schemas/MonthValue'
          type: array
          title: Credit Score
          description: Credit score time-series.
        protection_score:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Protection Score
          description: Protection pillar score (0–100).
          default: 0
        life_cover_adequacy:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Life Cover Adequacy
          description: Life cover adequacy ratio (current / ideal).
          default: 0
        current_life_cover:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Current Life Cover
          description: Current life insurance cover (INR).
          default: 0
        ideal_life_cover:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Ideal Life Cover
          description: Recommended life insurance cover (INR).
          default: 0
        health_cover_adequacy:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Health Cover Adequacy
          description: Health cover adequacy ratio (current / ideal).
          default: 0
        current_health_cover:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Current Health Cover
          description: Current health insurance cover (INR).
          default: 0
        ideal_health_cover:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Ideal Health Cover
          description: Recommended health insurance cover (INR).
          default: 0
        tax_score:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Tax Score
          description: Tax pillar score (0–100).
          default: 0
        tax_filing_status:
          anyOf:
          - type: string
          - type: 'null'
          title: Tax Filing Status
          description: Tax filing status, e.g. `"filed"`, `"not_filed"`.
          default: ''
        tax_regime:
          anyOf:
          - type: string
          - type: 'null'
          title: Tax Regime
          description: Tax regime, e.g. `"old"`, `"new"`.
          default: ''
        tax_saving_index:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Tax Saving Index
          description: Tax saving utilisation index (0–100).
          default: 0
        tax_saving_index_availed:
          items:
            type: string
          type: array
          title: Tax Saving Index Availed
          description: Tax saving instruments already availed.
        tax_saving_index_possible:
          items:
            type: string
          type: array
          title: Tax Saving Index Possible
          description: Tax saving instruments available but not yet availed.
        wealth_score:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Wealth Score
          description: Wealth pillar score (0–100).
          default: 0
        monthly_investment:
          items:
            $ref: '#/components/schemas/MonthValue'
          type: array
          title: Monthly Investment
          description: Monthly investment amount time-series.
        investment_rate:
          items:
            $ref: '#/components/schemas/MonthValue'
          type: array
          title: Investment Rate
          description: Monthly investment rate time-series.
        portfolio_diversification:
          items:
            $ref: '#/components/schemas/PortfolioSlice'
          type: array
          title: Portfolio Diversification
          description: Portfolio diversification breakdown.
        portfolio_overlap:
          items: {}
          type: array
          title: Portfolio Overlap
          description: Portfolio overlap data.
        rule_based_insights:
          anyOf:
          - $ref: '#/components/schemas/RuleBasedInsights'
          - type: 'null'
          description: Pre-computed rule-based insight cards per pillar.
        metric_level_scores:
          additionalProperties:
            anyOf:
            - type: number
            - type: integer
            - type: 'null'
          type: object
          title: Metric Level Scores
          description: Pass-through metric-level scores for the response.
      type: object
      title: FfrScreenData
      description: 'Financial payload under ``data``.  Most fields are optional so

        single-pillar requests can omit unused sections; provided fields are

        type-checked.  Nullable scalars accept ``null`` from clients that have

        no data for a given pillar (common in insight requests).'
    FinboxFeatures:
      properties:
        category_spending_profile:
          additionalProperties:
            anyOf:
            - type: number
            - type: 'null'
          type: object
          title: Category Spending Profile
          description: Map of spending category to average monthly amount (INR). Null
            values indicate categories with no data.
        is_income_stable:
          anyOf:
          - type: integer
          - type: 'null'
          title: Is Income Stable
          description: Finbox income-stability flag (1 = stable, 0 = unstable).
        surplus:
          anyOf:
          - type: number
          - type: integer
          - type: 'null'
          title: Surplus
          description: Finbox-computed monthly surplus (income minus expenses) in
            INR.
      type: object
      title: FinboxFeatures
      description: Finbox-derived features nested under ``features.finbox``.
    InsightErrorBody:
      properties:
        code:
          type: string
          title: Code
          description: Machine-readable error code, e.g. `VALIDATION_ERROR`.
        message:
          type: string
          title: Message
          description: Human-readable error summary.
        details:
          items:
            $ref: '#/components/schemas/ValidationDetail'
          type: array
          title: Details
          description: Per-field validation failure details (empty on non-validation
            errors).
      type: object
      required:
      - code
      - message
      title: InsightErrorBody
      description: Error envelope returned when insight generation fails.
    InsightFinboxFeatures:
      properties:
        category_spending_profile:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Category Spending Profile
          description: Per-category monthly spend breakdown. Keys follow the pattern
            `total_{essential|discretionary}_spends_{category}_m{0-6}`.
        expense_profile_merchants:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Expense Profile Merchants
          description: Merchant-level transaction counts, amounts, and percentages
            (e.g. `cnt_txns_zomato_v3_c30`, `amt_txns_amazon_v3_c30`).
        bill_profile:
          anyOf:
          - additionalProperties:
              $ref: '#/components/schemas/BillAccount'
